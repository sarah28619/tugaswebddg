<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Desktop - 7 | Reset Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen p-8 flex flex-col">
    <button class="text-2xl mb-12">&larr;</button>
    <div class="max-w-5xl mx-auto flex gap-20">
        <div class="flex-1">
            <h2 class="text-2xl font-bold mb-8">Reset pasword</h2>
            <div class="space-y-4 mb-4">
                <input type="password" placeholder="Password baru" class="w-full bg-[#800000] text-white placeholder-white/70 p-3 rounded-xl outline-none">
                <input type="password" placeholder="Konfirmasi Password" class="w-full bg-[#800000] text-white placeholder-white/70 p-3 rounded-xl outline-none">
            </div>
            <button class="w-full bg-[#800000] text-white py-3 rounded-xl font-bold border border-black mb-4">Send</button>
            <p class="text-sm font-bold">Back to sign in</p>
        </div>
        
        <div class="flex-1 border-l pl-20 flex flex-col items-center justify-center text-center">
            <h2 class="text-2xl font-bold mb-6">Berhasil</h2>
            <div class="w-20 h-20 rounded-full border-4 border-black flex items-center justify-center text-4xl mb-6">✓</div>
            <p class="text-gray-500 mb-20 italic">Pasword berhasil diubah</p>
            <p class="text-xs text-gray-400">klik dimana saja untuk lanjut</p>
        </div>
    </div>
</body>
</html>
